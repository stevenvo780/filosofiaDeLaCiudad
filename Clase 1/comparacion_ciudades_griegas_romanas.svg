<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Comparación 2D entre ciudad griega y ciudad romana</title>
  <desc id="desc">Mapa esquemático en 2D que contrasta la organización urbana de una polis griega y una ciudad romana.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ea; }
      .panel { fill: #fffdf8; stroke: #3f3a34; stroke-width: 3; rx: 24; }
      .title { font: 700 30px 'DejaVu Sans', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 600 18px 'DejaVu Sans', Arial, sans-serif; fill: #374151; }
      .label { font: 600 17px 'DejaVu Sans', Arial, sans-serif; fill: #111827; }
      .small { font: 500 15px 'DejaVu Sans', Arial, sans-serif; fill: #374151; }
      .note { font: 500 14px 'DejaVu Sans', Arial, sans-serif; fill: #4b5563; }
      .greek-line { stroke: #2f6f6f; stroke-width: 4; fill: none; }
      .roman-line { stroke: #8b3d2f; stroke-width: 4; fill: none; }
      .greek-fill { fill: #bfe4dd; stroke: #2f6f6f; stroke-width: 3; }
      .roman-fill { fill: #f3c7b8; stroke: #8b3d2f; stroke-width: 3; }
      .neutral-fill { fill: #e8dcc7; stroke: #7c6f64; stroke-width: 2; }
      .road { stroke: #7c6f64; stroke-width: 8; fill: none; stroke-linecap: round; }
      .grid-road { stroke: #7c6f64; stroke-width: 9; fill: none; }
      .arrow { stroke: #374151; stroke-width: 3; marker-end: url(#arrowhead); }
      .legend-box { fill: #ffffff; stroke: #6b7280; stroke-width: 2; rx: 14; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />
  <text class="title" x="700" y="55" text-anchor="middle">Diferencias urbanas: ciudad griega vs ciudad romana</text>
  <text class="subtitle" x="700" y="85" text-anchor="middle">Esquema 2D para identificar forma, funciones políticas y organización del espacio</text>

  <rect class="panel" x="50" y="120" width="610" height="680" />
  <rect class="panel" x="740" y="120" width="610" height="680" />

  <text class="title" x="355" y="165" text-anchor="middle">Polis griega</text>
  <text class="title" x="1045" y="165" text-anchor="middle">Ciudad romana</text>

  <path d="M120 650 C180 560, 180 420, 250 360 C300 310, 340 250, 370 210 C430 260, 490 320, 540 430 C560 490, 560 590, 520 700 C390 735, 250 735, 120 650 Z" class="greek-fill" opacity="0.45"/>
  <path d="M830 250 L1260 250 L1260 700 L830 700 Z" class="roman-fill" opacity="0.35"/>

  <path class="road" d="M150 630 C240 590, 280 530, 310 470 C340 400, 395 335, 470 265" />
  <path class="road" d="M225 690 C275 635, 330 590, 365 520 C405 445, 455 390, 535 345" />
  <path class="road" d="M180 500 C250 485, 340 485, 425 505" />
  <path class="road" d="M260 300 C315 335, 360 372, 395 420" />

  <polygon class="neutral-fill" points="305,240 390,195 455,245 430,320 330,320" />
  <text class="label" x="380" y="255" text-anchor="middle">Acrópolis</text>
  <text class="small" x="380" y="278" text-anchor="middle">Altura sagrada y defensiva</text>

  <rect class="greek-fill" x="260" y="440" width="190" height="110" rx="16" />
  <text class="label" x="355" y="485" text-anchor="middle">Ágora</text>
  <text class="small" x="355" y="510" text-anchor="middle">Mercado y vida cívica</text>

  <circle class="neutral-fill" cx="210" cy="395" r="42" />
  <text class="small" x="210" y="390" text-anchor="middle">Teatro</text>
  <text class="note" x="210" y="410" text-anchor="middle">sobre pendiente</text>

  <rect class="neutral-fill" x="465" y="500" width="90" height="70" rx="12" />
  <text class="small" x="510" y="535" text-anchor="middle">Templos</text>

  <text class="label" x="115" y="735">Rasgos clave</text>
  <text class="small" x="115" y="760">• Trazado más orgánico, adaptado al relieve</text>
  <text class="small" x="115" y="785">• Centro político-religioso separado en altura</text>

  <path class="grid-road" d="M875 310 H1215" />
  <path class="grid-road" d="M875 390 H1215" />
  <path class="grid-road" d="M875 470 H1215" />
  <path class="grid-road" d="M875 550 H1215" />
  <path class="grid-road" d="M875 630 H1215" />
  <path class="grid-road" d="M915 270 V680" />
  <path class="grid-road" d="M1010 270 V680" />
  <path class="grid-road" d="M1105 270 V680" />
  <path class="grid-road" d="M1200 270 V680" />

  <rect class="roman-fill" x="950" y="420" width="210" height="120" rx="18" />
  <text class="label" x="1055" y="468" text-anchor="middle">Foro</text>
  <text class="small" x="1055" y="494" text-anchor="middle">Centro administrativo, comercial y judicial</text>

  <rect class="neutral-fill" x="990" y="260" width="130" height="70" rx="12" />
  <text class="small" x="1055" y="302" text-anchor="middle">Basílica</text>

  <ellipse class="neutral-fill" cx="860" cy="430" rx="70" ry="48" />
  <text class="small" x="860" y="425" text-anchor="middle">Anfiteatro</text>
  <text class="note" x="860" y="445" text-anchor="middle">espectáculo masivo</text>

  <rect class="neutral-fill" x="1170" y="585" width="105" height="78" rx="12" />
  <text class="small" x="1222" y="620" text-anchor="middle">Termas</text>
  <text class="note" x="1222" y="640" text-anchor="middle">ocio e higiene</text>

  <path class="roman-line" d="M790 225 C860 180, 910 170, 980 170" />
  <text class="small" x="800" y="205">Acueducto / ingeniería hidráulica</text>

  <text class="small" x="920" y="720">Cardo</text>
  <text class="small" x="1115" y="720">Decumanus</text>
  <text class="label" x="820" y="760">Rasgos clave</text>
  <text class="small" x="820" y="785">• Retícula planificada y repetible</text>
  <text class="small" x="820" y="810">• Poder imperial visible en obras públicas</text>

  <line class="arrow" x1="425" y1="330" x2="415" y2="230" />
  <line class="arrow" x1="355" y1="438" x2="355" y2="375" />
  <line class="arrow" x1="1055" y1="418" x2="1055" y2="350" />
  <line class="arrow" x1="915" y1="420" x2="905" y2="350" />

  <rect class="legend-box" x="420" y="820" width="560" height="58" />
  <rect class="greek-fill" x="445" y="838" width="34" height="18" rx="4" />
  <text class="small" x="490" y="852">Espacios dominantes de la polis griega</text>
  <rect class="roman-fill" x="730" y="838" width="34" height="18" rx="4" />
  <text class="small" x="775" y="852">Espacios dominantes de la ciudad romana</text>
</svg>
